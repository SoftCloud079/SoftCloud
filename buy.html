<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="images/favicon.png">
<link rel="icon" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftCloud Buy</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background-color: #0a0a0a;
    margin: 0;
    padding: 0;
    color: #eee;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* Banner */
  #banner {
    width: 100%;
    background-color: #4b0082;
    color: #fff;
    text-align: center;
    padding: 12px 0;
    font-weight: 500;
    font-size: 1em;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    transition: all 0.5s ease;
    position: absolute;
    top: 0;
  }

  h1 {
    font-size: 2em;
    color: #9b59b6;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.2em;
    color: #ccc;
  }

  footer {
    text-align: center;
    color: #9b59b6;
    padding: 15px 0;
    font-size: 0.9em;
    letter-spacing: 1px;
    position: absolute;
    bottom: 0;
    width: 100%;
  }
</style>
</head>
<body>

  <div id="sidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeSidebar()">×</a>
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="shop.html">Shop</a>
  <a href="team.html">Meet the People</a>
</div>

<!-- Button to open sidebar -->
<span class="openbtn" onclick="openSidebar()">☰ Menu</span>
<div id="banner">Website is under construction — will be back soon!</div>

<h1>Sorry!</h1>
<p>This website is currently down.</p>

<footer>SOFTCLOUD®</footer>

<script>
  // Hide banner after 5 seconds
  setTimeout(() => {
    const banner = document.getElementById('banner');
    banner.style.opacity = '0';
    banner.style.transform = 'translateY(-50px)';
    setTimeout(() => banner.style.display = 'none', 500);
  }, 5000);
</script>

</body>
</html>
