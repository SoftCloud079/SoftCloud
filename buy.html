<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftCloud | Buy</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #0a0a0a;
      color: #eee;
      margin: 0;
      min-height: 100vh;
    }

    /* Banner */
    #banner {
      width: 100%;
      background-color: #4b0082;
      color: #fff;
      text-align: center;
      padding: 12px 0;
      font-weight: 500;
      font-size: 1em;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      transition: all 0.5s ease;
      position: fixed;
      top: 0;
      z-index: 100;
    }

    /* Sidebar */
    #sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #1a001a;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 101;
    }

    #sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 1.1rem;
      color: #eee;
      display: block;
      transition: 0.2s;
    }

    #sidebar a:hover {
      background-color: #9b59b6;
      color: white;
    }

    #sidebar .closebtn {
      position: absolute;
      top: 10px;
      right: 18px;
      font-size: 2em;
    }

    .openbtn {
      font-size: 1.2em;
      cursor: pointer;
      color: #eee;
      background-color: #1a001a;
      padding: 10px 15px;
      border-radius: 6px;
      margin: 10px;
      transition: background-color 0.2s;
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 102;
    }

    .openbtn:hover {
      background-color: #9b59b6;
    }

    /* Form Container */
    .container {
      max-width: 500px;
      margin: 120px auto 60px; /* leave space for banner */
      padding: 20px;
      background-color: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(155,89,182,0.4);
      text-align: left;
    }

    .container h1 {
      text-align: center;
      color: #9b59b6;
      margin-bottom: 20px;
    }

    .container label {
      display: block;
      margin: 12px 0 6px;
    }

    .container input, .container select, .container textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background-color: #2b002b;
      color: #eee;
      font-size: 1em;
      margin-bottom: 12px;
    }

    .container button {
      width: 100%;
      padding: 12px;
      background-color: #9b59b6;
      border: none;
      color: white;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .container button:hover {
      background-color: #8e44ad;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(155,89,182,0.5);
    }

    footer {
      text-align: center;
      color: #9b59b6;
      padding: 15px 0;
      font-size: 0.9em;
      letter-spacing: 1px;
      background-color: #0a0a0a;
      box-shadow: 0 -2px 6px rgba(155, 89, 182, 0.3);
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeSidebar()">×</a>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="shop.html">Shop</a>
    <a href="team.html">Meet the People</a>
  </div>

  <span class="openbtn" onclick="openSidebar()">☰ Menu</span>

  <!-- Banner -->
  <div id="banner">SoftCloud Store — Fun, Fake Orders Only!</div>

  <!-- Form Container -->
  <div class="container">
    <h1>Place Your Order</h1>
    <form id="buyForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" required>

      <label for="item">Item:</label>
      <select id="item" required>
        <option value="H4RAN Plushie">H4RAN Plushie</option>
        <option value="MRYOLOPLUSHIE">MRYOLOPLUSHIE</option>
        <option value="CRITICO Plushie">CRITICO Plushie</option>
      </select>

      <label for="notes">Notes (optional):</label>
      <textarea id="notes" rows="3" placeholder="Any special requests..."></textarea>

      <button type="submit">Place Order</button>
    </form>
  </div>

  <footer>SOFTCLOUD®</footer>

  <script>
    // Banner hide after 5 seconds
    setTimeout(() => {
      const banner = document.getElementById('banner');
      banner.style.opacity = '0';
      banner.style.transform = 'translateY(-50px)';
      setTimeout(() => banner.style.display = 'none', 500);
    }, 5000);

    // Sidebar functions
    function openSidebar() { document.getElementById("sidebar").style.width = "220px"; }
    function closeSidebar() { document.getElementById("sidebar").style.width = "0"; }

    // Fake order submission
    document.getElementById("buyForm").addEventListener("submit", function(e){
      e.preventDefault();
      const messages = [
        "SORRY, SOLD OUT!",
        "ERROR: Something went wrong!",
        "Oops! Item unavailable.",
        "SORRY, WE CANNOT PROCESS YOUR ORDER!"
      ];
      const msg = messages[Math.floor(Math.random() * messages.length)];
      alert(msg);
    });
  </script>

</body>
</html>
