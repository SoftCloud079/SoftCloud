<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftCloud | Projects</title>
<style>
  /* Reset & Body */
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background-color: #0a0a0a;
    color: #eee;
    min-height: 100vh;
  }

  /* Navbar */
  nav {
    display: flex;
    justify-content: center;
    background-color: #1a1a1a;
    padding: 12px 0;
    box-shadow: 0 2px 6px rgba(155, 89, 182, 0.4);
  }

  nav a {
    color: #9b59b6;
    text-decoration: none;
    margin: 0 20px;
    font-weight: 500;
    transition: color 0.3s;
  }

  nav a:hover {
    color: #fff;
  }

  /* Projects Section */
  .projects {
    padding: 40px 20px;
    text-align: center;
  }

  .projects h2 {
    font-size: 2.5em;
    color: #9b59b6;
    margin-bottom: 30px;
  }

  /* Project Cards */
  .project-card {
    background-color: #1a1a1a;
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(155, 89, 182, 0.4);
    padding: 20px;
    margin: 20px auto;
    max-width: 500px;
    text-align: left;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .project-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(155, 89, 182, 0.6);
  }

  .project-card h3 {
    font-size: 1.5em;
    color: #eee;
    margin-bottom: 10px;
  }

  .project-card p {
    color: #ccc;
    font-size: 1em;
    margin-bottom: 15px;
  }

  /* Status badges */
  .status {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 12px;
    font-size: 0.9em;
    font-weight: bold;
    margin-bottom: 15px;
  }

  .status.in-progress {
    background-color: #9b59b6;
    color: white;
  }

  .status.released {
    background-color: #555;
    color: #fff;
  }

  /* Buttons */
  .project-card button {
    background-color: #9b59b6;
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.95em;
    cursor: pointer;
    transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
  }

  .project-card button:hover {
    background-color: #8e44ad;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(155, 89, 182, 0.5);
  }

  /* Footer */
  footer {
    text-align: center;
    color: #9b59b6;
    padding: 15px 0;
    font-size: 0.9em;
    letter-spacing: 1px;
    background-color: #0a0a0a;
    box-shadow: 0 -2px 6px rgba(155, 89, 182, 0.3);
  }

  /* Responsive */
  @media (max-width: 600px) {
    nav {
      flex-direction: column;
    }

    nav a {
      margin: 8px 0;
    }

    .project-card {
      margin: 20px 10px;
      max-width: 90%;
    }
  }
</style>
</head>
<body>

<!-- Navbar -->
<nav>
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="shop.html">Shop</a>
  <a href="team.html">Meet the People</a>
</nav>

<!-- Projects Section -->
<section class="projects">
  <h2>Our Projects</h2>

  <div class="project-card">
    <h3>Find virrs missing chromosomes</h3>
    <p>ITS STILL MISSING HOLY…</p>
    <span class="status in-progress">In Progress</span>
    <button onclick="alert('Sorry, this project page is down')">Check it out</button>
  </div>

  <div class="project-card">
    <h3>bobot eco adventure</h3>
    <p>Fun eco game in prototype and testing.</p>
    <span class="status released">Prototype</span>
    <button onclick="alert('Testing only for staff')">TESTING ONLY FOR STAFF</button>
  </div>

  <!-- Add more project cards here -->
</section>

<footer>
  <p>Made by SoftCloud®</p>
</footer>

</body>
</html>
