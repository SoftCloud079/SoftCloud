<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftCloud | Projects</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      margin: 0;
      color: #eee;
      display: flex;
      min-height: 100vh;
    }

    /* Banner */
    #banner {
      width: 100%;
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 12px;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,.6);
      transition: 0.5s;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 900;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background-color: #1a001a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px; /* space for banner */
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 800;
      box-shadow: 2px 0 8px rgba(155,89,182,0.3);
    }

    .sidebar button {
      width: 80%;
      margin: 10px 0;
      padding: 12px 0;
      background-color: #9b59b6;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .sidebar button:hover {
      background-color: #8e44ad;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(155,89,182,0.5);
    }

    /* Container for page content */
    .container {
      margin-left: 240px; /* space for sidebar */
      padding: 100px 30px 30px 30px; /* top space for banner */
      flex: 1;
    }

    h2 {
      font-size: 2.5em;
      color: #9b59b6;
      text-align: center;
      margin-bottom: 30px;
    }

    /* Project Cards */
    .project-card {
      background-color: #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(155, 89, 182, 0.4);
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
      text-align: left;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(155, 89, 182, 0.6);
    }

    .project-card h3 {
      font-size: 1.5em;
      color: #eee;
      margin-bottom: 10px;
    }

    .project-card p {
      color: #ccc;
      font-size: 1em;
      margin-bottom: 15px;
    }

    .status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.9em;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .status.in-progress {
      background-color: #9b59b6;
      color: white;
    }

    .status.released {
      background-color: #555;
      color: #fff;
    }

    .project-card button {
      background-color: #9b59b6;
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.95em;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
    }

    .project-card button:hover {
      background-color: #8e44ad;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(155, 89, 182, 0.5);
    }

    footer {
      text-align: center;
      color: #9b59b6;
      padding: 15px 0;
      font-size: 0.9em;
      letter-spacing: 1px;
      background-color: #0a0a0a;
      box-shadow: 0 -2px 6px rgba(155, 89, 182, 0.3);
    }

    @media (max-width: 800px) {
      .sidebar {
        width: 60px;
        padding-top: 80px;
      }

      .sidebar button {
        padding: 10px 4px;
        font-size: 0.85rem;
      }

      .container {
        margin-left: 70px;
        padding: 100px 15px 30px 15px;
      }
    }
  </style>
</head>
<body>

  <!-- Banner -->
  <div id="banner">
    STILL MAKING THE WEBSITE LOL — will be DONE WHENEVER I FEEL LIKE IT!
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <button onclick="window.location.href='index.html'">Home</button>
    <button onclick="window.location.href='projects.html'">Projects</button>
    <button onclick="window.location.href='shop.html'">Shop</button>
    <button onclick="window.location.href='team.html'">Meet the People</button>
  </div>

  <!-- Page Content -->
  <div class="container">
    <h2>Our Projects</h2>

    <div class="project-card">
      <h3>IRIS</h3>
      <p>still in planning and reworking due to tragity in development…</p>
      <span class="status in-progress">In Progress</span>
      <button onclick="alert('Sorry, this project is not available')">Check it out</button>
    </div>

    <div class="project-card">
      <h3>bobot eco adventure</h3>
      <p>Fun eco game in prototype and testing.</p>
      <span class="status released">Prototype</span>
      <button onclick="alert('Testing only for staff. We will notify when public.')">TESTING ONLY FOR STAFF</button>
    </div>

    <!-- Add more project cards here -->
  </div>

  <footer>
    <p>Made by SoftCloud®</p>
  </footer>

  <script>
    // Banner hide after 5 seconds
    setTimeout(() => {
      const banner = document.getElementById("banner");
      if (banner) {
        banner.style.opacity = "0";
        banner.style.transform = "translateY(-50px)";
        setTimeout(() => banner.style.display = "none", 500);
      }
    }, 5000);
  </script>

</body>
</html>
