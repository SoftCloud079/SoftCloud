<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      font-size: 24px;
    }

    .container {
      padding: 40px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<header>
  My Free Website
</header>

<div class="container">
  <h1>Hello 👋</h1>
  <p>This website is hosted for free using GitHub Pages.</p>

  <button onclick="sayHello()">Click Me</button>
</div>

<script>
function sayHello() {
  alert("Welcome to my website!");
}
</script>

</body>
</html>
