<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftCloud Merch Shop</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  margin:0;
  color:#eee;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* Banner */

#banner{
  width:100%;
  background:#4b0082;
  color:white;
  text-align:center;
  padding:12px;
  font-weight:500;
  box-shadow:0 2px 8px rgba(0,0,0,.6);
  transition:.5s;
}

/* Container */

.container{
  padding:30px 20px;
  flex:1;
}

h1{
  text-align:center;
  color:#9b59b6;
  font-size:2.2rem;
  margin-bottom:35px;
}

/* Shop grid */

.shop-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
  max-width:1100px;
  margin:auto;
}

/* Card */

.card{
  background:#161616;
  border-radius:14px;
  padding:18px;
  text-align:center;
  position:relative;
  transition:.25s;
  box-shadow:0 4px 14px rgba(155,89,182,.25);
  overflow:hidden;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(155,89,182,.5);
}

/* Image wrapper */

.image-box{
  overflow:hidden;
  border-radius:10px;
}

.image-box img{
  width:100%;
  height:auto;
  object-fit:contain;
  transition:transform .35s ease;
}

.card:hover img{
  transform:scale(1.08);
}

/* Text */

.card h3{
  margin:12px 0 6px;
  font-size:1.1rem;
}

.card p{
  margin:4px 0 12px;
  color:#bbb;
}

/* Button */

.card button{
  background:#9b59b6;
  border:none;
  padding:9px 14px;
  color:white;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.card button:hover{
  background:#8e44ad;
  transform:translateY(-2px);
}

/* Sold Out Ribbon */

.sold-out{
  position:absolute;
  top:12px;
  left:-40px;
  background:#9b59b6;
  color:white;
  padding:6px 45px;
  transform:rotate(-35deg);
  font-size:12px;
  font-weight:bold;
  letter-spacing:1px;
}

/* Footer */

footer{
  text-align:center;
  color:#9b59b6;
  padding:15px;
}

</style>
</head>

<body>

<div id="banner">
STILL MAKING THE WEBSITE LOL — will be DONE WHENEVER I FEEL LIKE IT!
</div>

<div class="container">

<h1>SoftCloud Merch Shop</h1>

<div class="shop-container">

<div class="card">
<div class="sold-out">SOLD OUT</div>

<div class="image-box">
<img src="images/SORRYSOLDOUT.jpg" alt="H4RAN Plushie">
</div>

<h3>H4RAN Plushie</h3>
<p>$15.00</p>
<button>Add to Cart</button>
</div>


<div class="card">
<div class="sold-out">SOLD OUT</div>

<div class="image-box">
<img src="images/SORRYSOLDOUT.jpg" alt="MRYOLOPLUSHIE">
</div>

<h3>MRYOLOPLUSHIE</h3>
<p>$15.00</p>
<button>Add to Cart</button>
</div>


<div class="card">
<div class="sold-out">FEW LEFT</div>

<div class="image-box">
<img src="images/criticoplushie.png" alt="CRITICO Plushie">
</div>

<h3>CRITICO Plushie</h3>
<p>$15.00</p>
<button>Add to Cart</button>
</div>

</div>
</div>

<footer>SOFTCLOUD®</footer>

<script>

setTimeout(() => {

const banner = document.getElementById("banner")

banner.style.opacity="0"
banner.style.transform="translateY(-50px)"

setTimeout(()=>{
banner.style.display="none"
},500)

},5000)

</script>

</body>
</html>
