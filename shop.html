<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftCloud Merch Shop</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  margin:0;
  color:#eee;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* Banner */

#banner{
  width:100%;
  background:#4b0082;
  color:#fff;
  text-align:center;
  padding:12px 0;
  font-weight:500;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
  transition:all .5s ease;
}

.container{
  padding:20px;
  flex:1;
}

h1{
  text-align:center;
  color:#9b59b6;
  margin-bottom:30px;
}

/* Grid */

.shop-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

/* Card */

.card{
  background:#1a1a1a;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(155,89,182,.4);
  padding:15px;
  text-align:center;
  position:relative;
  transition:.2s;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 16px rgba(155,89,182,.6);
}

/* Image fix */

.card img{
  width:100%;
  height:auto;
  max-height:250px;
  object-fit:contain;
  border-radius:8px;
  margin-bottom:10px;
}

/* Text */

.card h3{
  margin:10px 0 5px;
}

.card p{
  margin:5px 0 10px;
  color:#ccc;
}

/* Button */

.card button{
  background:#9b59b6;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:.2s;
}

.card button:hover{
  background:#8e44ad;
  transform:translateY(-2px);
}

/* Sold out badge */

.sold-out{
  position:absolute;
  top:10px;
  left:-10px;
  background:rgba(155,89,182,.9);
  padding:5px 15px;
  border-radius:0 8px 8px 0;
  font-weight:bold;
}

/* Footer */

footer{
  text-align:center;
  color:#9b59b6;
  padding:15px;
}

</style>
</head>

<body>

<div id="banner">
STILL MAKING THE WEBSITE LOL — will be DONE WHENEVER I FEEL LIKE IT!
</div>

<div class="container">
<h1>SoftCloud Merch Shop</h1>

<div class="shop-container">

<div class="card">
<div class="sold-out">Sold Out</div>
<img src="images/h4ran_plushie.jpg" alt="H4RAN Plushie">
<h3>H4RAN Plushie</h3>
<p>$15.00</p>
<button onclick="location.href='buy.html'">Add to Cart (SOLD OUT)</button>
</div>

<div class="card">
<div class="sold-out">Sold Out</div>
<img src="images/mryoloplushie.jpg" alt="MRYOLOPLUSHIE">
<h3>MRYOLOPLUSHIE</h3>
<p>$15.00</p>
<button onclick="location.href='buy.html'">Add to Cart (SOLD OUT)</button>
</div>

<div class="card">
<div class="sold-out">Sold Out</div>
<img src="images/criticoplushie.png" alt="CRITICO PLUSHIE">
<h3>CRITICO PLUSHIE</h3>
<p>$15.00</p>
<button onclick="location.href='buy.html'">Add to Cart (SOLD OUT)</button>
</div>

</div>
</div>

<footer>SOFTCLOUD®</footer>

<script>
setTimeout(() => {
  const banner = document.getElementById("banner");
  banner.style.opacity = "0";
  banner.style.transform = "translateY(-50px)";
  setTimeout(()=> banner.style.display="none",500);
},5000);
</script>

</body>
</html>
