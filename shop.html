<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftCloud Merch Shop</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      margin: 0;
      color: #eee;
      display: flex;
      min-height: 100vh;
    }

    /* Banner */
    #banner {
      width: 100%;
      background: #4b0082;
      color: white;
      text-align: center;
      padding: 12px;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,.6);
      transition: 0.5s;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 900;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background-color: #1a001a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px; /* leave space for banner */
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 800;
      box-shadow: 2px 0 8px rgba(155,89,182,0.3);
    }

    .sidebar button {
      width: 80%;
      margin: 10px 0;
      padding: 12px 0;
      background-color: #9b59b6;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .sidebar button:hover {
      background-color: #8e44ad;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(155,89,182,0.5);
    }

    /* Container */
    .container {
      margin-left: 240px; /* sidebar width + spacing */
      padding: 100px 30px 30px 30px; /* top space for banner */
      flex: 1;
    }

    h1 {
      text-align: center;
      color: #9b59b6;
      font-size: 2.2rem;
      margin-bottom: 35px;
    }

    /* Shop grid */
    .shop-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
      gap: 25px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #161616;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      position: relative;
      transition: .25s;
      box-shadow: 0 4px 14px rgba(155,89,182,.25);
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 25px rgba(155,89,182,.5);
    }

    .image-box {
      overflow: hidden;
      border-radius: 10px;
    }

    .image-box img {
      width: 100%;
      height: auto;
      object-fit: contain;
      transition: transform .35s ease;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    .card h3 {
      margin: 12px 0 6px;
      font-size: 1.1rem;
    }

    .card p {
      margin: 4px 0 12px;
      color: #bbb;
    }

    .card button {
      background: #9b59b6;
      border: none;
      padding: 9px 14px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: .2s;
    }

    .card button:hover {
      background: #8e44ad;
      transform: translateY(-2px);
    }

    .sold-out {
      position: absolute;
      top: 12px;
      left: -40px;
      background: #9b59b6;
      color: white;
      padding: 6px 45px;
      transform: rotate(-35deg);
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    footer {
      text-align: center;
      color: #9b59b6;
      padding: 15px;
      margin-top: auto;
    }

    @media (max-width: 800px) {
      .sidebar {
        width: 60px;
        padding-top: 80px;
      }

      .sidebar button {
        padding: 10px 4px;
        font-size: 0.85rem;
      }

      .container {
        margin-left: 70px;
        padding: 100px 15px 30px 15px;
      }
    }

  </style>
</head>
<body>

  <!-- Banner -->
  <div id="banner">
    STILL MAKING THE WEBSITE LOL — will be DONE WHENEVER I FEEL LIKE IT!
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <button onclick="window.location.href='index.html'">Home</button>
    <button onclick="window.location.href='projects.html'">Projects</button>
    <button onclick="window.location.href='shop.html'">Shop</button>
    <button onclick="window.location.href='team.html'">Meet the People</button>
  </div>

  <!-- Page content -->
  <div class="container">
    <h1>SoftCloud Merch Shop</h1>

    <div class="shop-container">
      <div class="card">
        <div class="sold-out">SOLD OUT</div>
        <div class="image-box">
          <img src="images/SORRYSOLDOUT.jpg" alt="H4RAN Plushie">
        </div>
        <h3>H4RAN Plushie</h3>
        <p>$15.00</p>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <div class="sold-out">SOLD OUT</div>
        <div class="image-box">
          <img src="images/SORRYSOLDOUT.jpg" alt="MRYOLOPLUSHIE">
        </div>
        <h3>MRYOLOPLUSHIE</h3>
        <p>$15.00</p>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <div class="sold-out">FEW LEFT</div>
        <div class="image-box">
          <img src="images/criticoplushie.png" alt="CRITICO Plushie">
        </div>
        <h3>CRITICO Plushie</h3>
        <p>$15.00</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </div>

  <footer>SOFTCLOUD®</footer>

  <script>
    // Banner hide after 5 seconds
    setTimeout(() => {
      const banner = document.getElementById("banner");
      if(banner){
        banner.style.opacity = "0";
        banner.style.transform = "translateY(-50px)";
        setTimeout(()=>banner.style.display="none",500);
      }
    },5000);
  </script>

</body>
</html>
